<div class='d-flex flex-row'>
    <h2>All Events ({{activities.length}})</h2>
    <label>
        <input
            type='checkbox'
            [checked]='calendarOptions.weekends'
            (change)='handleWeekendsToggle()'
        />
        Toggle Weekends
    </label>

</div>

<full-calendar [options]='calendarOptions'></full-calendar>
